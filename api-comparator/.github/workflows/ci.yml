name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
      - name: Run tests
        run: |
          . .venv/bin/activate
          python -m pytest -q
      - name: Bandit scan
        run: |
          . .venv/bin/activate
          pip install bandit
          bandit -r app -ll
      - name: Safety scan
        run: |
          . .venv/bin/activate
          pip install safety
          safety check -r requirements.txt || true
